<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Questões</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}
#topo{background:#000;color:white;padding:30px;text-align:center;}
#container{display:flex;flex-wrap:wrap;gap:20px;padding:20px;}
#formulario,#visor{
flex:1 1 350px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}
input,select,textarea{
width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid #ccc;
}
button{padding:10px;border:none;border-radius:6px;cursor:pointer;margin-top:5px;}
#importarSQL{background:#888;color:#fff;width:100%;}
#exportarSQL{background:#2bff7a;width:100%;}
.campo{background:#eef;padding:10px;border-radius:6px;margin-bottom:10px;}
</style>
</head>

<body>

<div id="topo">
<h2>Sistema de Questões</h2>
</div>

<div id="container">

<div id="formulario">

<input id="nquestao" placeholder="Número">
<input id="nquestaojogo" placeholder="nQuestão jogo">
<textarea id="questao" placeholder="Questão"></textarea>

<select id="materia">
<option></option><option>Matemática</option><option>História</option>
</select>

<select id="dificuldade">
<option></option><option>Facil</option><option>Medio</option><option>Dificil</option>
</select>

<select id="resposta">
<option></option><option>A</option><option>B</option>
</select>

<select id="puzzle">
<option>Captcha</option><option>CMD</option>
</select>

<button onclick="salvar()">Salvar</button>

<input type="file" id="arquivoImportar" hidden>
<button id="importarSQL">Importar SQL</button>
<button id="exportarSQL">Exportar SQL</button>

</div>

<div id="visor">
<div id="conteudoVisor"></div>
</div>

</div>

<script>

let index=0

function salvar(){
let dados=JSON.parse(localStorage.getItem("bancoQuestoes")||"[]")

dados.push({
nquestao:nquestao.value,
nquestaojogo:nquestaojogo.value,
questao:questao.value,
materia:materia.value,
dificuldade:dificuldade.value,
resposta:resposta.value,
puzzle:puzzle.value
})

localStorage.setItem("bancoQuestoes",JSON.stringify(dados))
mostrar()
}

/* =========================
   IMPORTADOR ULTRA ROBUSTO
========================= */

importarSQL.onclick=()=>arquivoImportar.click()

arquivoImportar.onchange=e=>{
const file=e.target.files[0]
if(!file)return

const reader=new FileReader()

reader.onload=e=>{

const sql=e.target.result

// pega tudo entre VALUES (...) ignorando formatação
const regex=/INSERT INTO\s+perguntas[\s\S]*?VALUES\s*\(([\s\S]*?)\);/gi

let match
let dados=[]

while((match=regex.exec(sql))!==null){

let linha=match[1]

// parser manual
let campos=[]
let atual=""
let aspas=false

for(let i=0;i<linha.length;i++){
let c=linha[i]

if(c==="'" && linha[i-1]!=="\\") aspas=!aspas

if(c==="," && !aspas){
campos.push(atual)
atual=""
}else{
atual+=c
}
}

campos.push(atual)

// limpa
campos=campos.map(c=>c.trim().replace(/^'|'$/g,""))

dados.push({
nquestao:campos[1]||"",
nquestaojogo:campos[2]||"",
questao:campos[3]||"",
materia:campos[4]||"",
dificuldade:campos[5]||"",
resposta:campos[6]||"",
puzzle:campos[7]||"",
arquivo:campos[8]||null
})

}

if(dados.length===0){
alert("❌ Não encontrou dados no SQL")
return
}

localStorage.setItem("bancoQuestoes",JSON.stringify(dados))
index=0
mostrar()

alert("✅ Importado "+dados.length+" questões!")

}

reader.readAsText(file)
}

/* ========================= */

exportarSQL.onclick=()=>{

const dados=JSON.parse(localStorage.getItem("bancoQuestoes")||"[]")

let sql=""

dados.forEach((q,i)=>{
sql+=`INSERT INTO perguntas VALUES (${i+1},'${q.nquestao}','${q.nquestaojogo}','${q.questao}','${q.materia}','${q.dificuldade}','${q.resposta}','${q.puzzle}','');\n`
})

const blob=new Blob([sql])
const a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="banco.sql"
a.click()

}

/* ========================= */

function mostrar(){

const dados=JSON.parse(localStorage.getItem("bancoQuestoes")||"[]")

if(dados.length===0){
conteudoVisor.innerHTML="Sem dados"
return
}

let q=dados[index]

conteudoVisor.innerHTML=`
<div class='campo'>${q.questao}</div>
<div class='campo'>Resposta: ${q.resposta}</div>
`

}

mostrar()

</script>

</body>
</html>
