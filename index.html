<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Questões</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}
#topo{background:#000;color:white;padding:30px;text-align:center;}
#container{display:flex;flex-wrap:wrap;gap:20px;padding:20px;}
#formulario,#visor{
flex:1 1 350px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}
input,select,textarea{
width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid #ccc;box-sizing: border-box;
}
button{padding:10px;border:none;border-radius:6px;cursor:pointer;margin-top:5px;font-weight:bold;}
.btn-salvar{background:#007bff; color:white; width:100%;}
.btn-editar{background:#ffc107; color:black; width:48%;}
.btn-excluir{background:#dc3545; color:white; width:48%;}
#importarSQL{background:#888;color:#fff;width:100%;}
#exportarSQL{background:#2bff7a;width:100%;}
.campo{background:#eef;padding:10px;border-radius:6px;margin-bottom:10px;}
#nav{display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;}
.btn-nav{background: #444; color: white; width: 40px; height: 40px;}
.btn-nav:hover{background: #222;}
#indicador{font-weight: bold; color: #555;}
.controles-visor{display:flex; justify-content: space-between; margin-top: 15px;}
</style>
</head>

<body>

<div id="topo">
<h2>Sistema de Questões</h2>
</div>

<div id="container">

<div id="formulario">
<input id="nquestao" placeholder="Número">
<input id="nquestaojogo" placeholder="nQuestão jogo">
<textarea id="questao" placeholder="Questão" rows="5"></textarea>

<select id="materia">
    <option value=""></option>
    <option>Biologia</option>
    <option>Matemática</option>
    <option>Física</option>
    <option>Química</option>
    <option>História</option>
    <option>Geografia</option>
    <option>Literatura</option>
    <option>Língua Portuguesa</option>
    <option>Arte</option>
    <option>Educação Física</option>
    <option>Sociologia</option>
    <option>Filosofia</option>
    <option>Conhecimentos Gerais</option>
</select>

<select id="dificuldade">
<option value=""></option><option>Facil</option><option>Medio</option><option>Dificil</option>
</select>

<select id="resposta">
<option value=""></option><option>A</option><option>B</option><option>C</option><option>D</option><option>E</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option>
</select>

<select id="puzzle">
<option>Captcha</option><option>CMD</option><option>Botao</option><option>Jogo das Cores</option>
</select>

<button class="btn-salvar" onclick="salvarNovo()">Salvar Nova Questão</button>

<input type="file" id="arquivoImportar" hidden>
<button id="importarSQL">Importar SQL</button>
<button id="exportarSQL">Exportar SQL</button>
</div>

<div id="visor">
    <div id="nav">
        <button class="btn-nav" onclick="mudarIndex(-1)"><</button>
        <span id="indicador">0 / 0</span>
        <button class="btn-nav" onclick="mudarIndex(1)">></button>
    </div>
    <hr>
    <div id="conteudoVisor"></div>
    
    <div class="controles-visor">
        <button class="btn-editar" onclick="editarAtual()">Editar Esta</button>
        <button class="btn-excluir" onclick="excluirAtual()">Excluir Esta</button>
    </div>
</div>

</div>

<script>
let index = 0;

function obterDados() {
    return JSON.parse(localStorage.getItem("bancoQuestoes") || "[]");
}

function mudarIndex(delta) {
    const dados = obterDados();
    if (dados.length === 0) return;
    index += delta;
    if (index < 0) index = 0;
    if (index >= dados.length) index = dados.length - 1;
    mostrar();
}

function salvarNovo() {
    let dados = obterDados();
    dados.push({
        nquestao: nquestao.value,
        nquestaojogo: nquestaojogo.value,
        questao: questao.value,
        materia: materia.value,
        dificuldade: dificuldade.value,
        resposta: resposta.value,
        puzzle: puzzle.value
    });
    localStorage.setItem("bancoQuestoes", JSON.stringify(dados));
    index = dados.length - 1;
    alert("Nova questão salva!");
    mostrar();
}

function editarAtual() {
    let dados = obterDados();
    if (dados.length === 0) return;
    
    dados[index] = {
        nquestao: nquestao.value,
        nquestaojogo: nquestaojogo.value,
        questao: questao.value,
        materia: materia.value,
        dificuldade: dificuldade.value,
        resposta: resposta.value,
        puzzle: puzzle.value
    };
    
    localStorage.setItem("bancoQuestoes", JSON.stringify(dados));
    alert("Questão " + (index + 1) + " atualizada!");
    mostrar();
}

function excluirAtual() {
    let dados = obterDados();
    if (dados.length === 0) return;

    if (confirm("Tem certeza que deseja excluir a questão " + (index + 1) + "?")) {
        dados.splice(index, 1);
        localStorage.setItem("bancoQuestoes", JSON.stringify(dados));
        if (index >= dados.length) index = Math.max(0, dados.length - 1);
        alert("Questão removida!");
        mostrar();
    }
}

function mostrar() {
    const dados = obterDados();
    const indicador = document.getElementById("indicador");
    const visor = document.getElementById("conteudoVisor");

    if (dados.length === 0) {
        visor.innerHTML = "Banco vazio.";
        indicador.innerText = "0 / 0";
        return;
    }

    let q = dados[index];
    indicador.innerText = `${index + 1} / ${dados.length}`;

    visor.innerHTML = `
        <div class='campo'><strong>ID Jogo:</strong> ${q.nquestaojogo}</div>
        <div class='campo'><strong>Matéria:</strong> ${q.materia} (${q.dificuldade})</div>
        <div class='campo'>${q.questao.replace(/\n/g, '<br>')}</div>
        <div class='campo'><strong>Resposta:</strong> ${q.resposta} | <strong>Puzzle:</strong> ${q.puzzle}</div>
    `;

    nquestao.value = q.nquestao;
    nquestaojogo.value = q.nquestaojogo;
    questao.value = q.questao;
    materia.value = q.materia;
    dificuldade.value = q.dificuldade;
    resposta.value = q.resposta;
    puzzle.value = q.puzzle;
}

// Funções de SQL
importarSQL.onclick = () => arquivoImportar.click();
arquivoImportar.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        const sql = e.target.result;
        const regex = /INSERT INTO\s+perguntas[\s\S]*?VALUES\s*\(([\s\S]*?)\);/gi;
        let match, dados = [];
        while ((match = regex.exec(sql)) !== null) {
            let linha = match[1], campos = [], atual = "", aspas = false;
            for (let i = 0; i < linha.length; i++) {
                let c = linha[i];
                if (c === "'" && linha[i - 1] !== "\\") aspas = !aspas;
                if (c === "," && !aspas) { campos.push(atual); atual = ""; } 
                else { atual += c; }
            }
            campos.push(atual);
            campos = campos.map(c => c.trim().replace(/^'|'$/g, ""));
            dados.push({
                nquestao: campos[1]||"", nquestaojogo: campos[2]||"", questao: campos[3]||"",
                materia: campos[4]||"", dificuldade: campos[5]||"", resposta: campos[6]||"",
                puzzle: campos[7]||""
            });
        }
        localStorage.setItem("bancoQuestoes", JSON.stringify(dados));
        index = 0;
        mostrar();
        alert("✅ Importado!");
    };
    reader.readAsText(file);
};

exportarSQL.onclick = () => {
    const dados = obterDados();
    let sql = "";
    dados.forEach((q, i) => {
        sql += `INSERT INTO perguntas VALUES (${i + 1},'${q.nquestao}','${q.nquestaojogo}','${q.questao}','${q.materia}','${q.dificuldade}','${q.resposta}','${q.puzzle}','');\n`;
    });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([sql]));
    a.download = "banco.sql";
    a.click();
};

mostrar();
</script>

</body>
</html>
